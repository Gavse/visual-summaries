<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#004E64"/>
      <stop offset="0.58" stop-color="#006680"/>
      <stop offset="1" stop-color="#003848"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#102A36" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#F4EFE7"/>
  <rect width="1200" height="190" fill="url(#hero)"/>
  <circle cx="105" cy="10" r="220" fill="#E99052" opacity="0.16"/>
  <text x="1080" y="108" direction="rtl" text-anchor="end" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">סיכום האקתון מערך הדיגיטל</text>
  <rect x="1000" y="136" width="82" height="6" rx="3" fill="#E99052"/>
  <rect x="100" y="158" width="1000" height="420" fill="#FEFCF8" stroke="#E5DED4" filter="url(#shadow)"/>
  <text x="1030" y="260" text-anchor="end" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#004E64">Zero to Mockup</text>
  <text x="930" y="260" text-anchor="end" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#A87B18">🥇 מקום ראשון</text>
  <text x="1030" y="320" direction="rtl" text-anchor="end" font-family="Arial, sans-serif" font-size="25" fill="#374151">סביבת עבודה למנהלי מוצר, שהופכת צורך ראשוני למוקאפ מוחשי</text>
  <text x="1030" y="360" direction="rtl" text-anchor="end" font-family="Arial, sans-serif" font-size="25" fill="#374151">באמצעות סוכני אפיון, פרסונות ומוקאפ.</text>
  <line x1="170" y1="420" x2="1030" y2="420" stroke="#E5DED4" stroke-width="2"/>
  <text x="1030" y="485" text-anchor="end" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#004E64">ProTrax</text>
  <text x="930" y="485" text-anchor="end" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#687684">🥈 מקום שני</text>
  <text x="1030" y="535" direction="rtl" text-anchor="end" font-family="Arial, sans-serif" font-size="23" fill="#374151">ניהול מחזור החיים של התקשרויות עם ספקים במקום אחד.</text>
</svg>